<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mood Dice 🎲</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Mood Dice 🎲</h1>
      <p>Roll the dice and discover your mood!</p>
    </header>

    <section class="dice-area">
      <div class="dice" id="dice">🎲</div>
      <button id="rollBtn">Roll</button>
    </section>

    <section class="mood-display">
      <h2 id="moodTitle">—</h2>
      <p id="moodDesc">Click roll to see your mood!</p>
      <button id="copyMood">Copy Mood</button>
    </section>

    <footer>
      <p>Made with ❤️ | Qais 2025</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
